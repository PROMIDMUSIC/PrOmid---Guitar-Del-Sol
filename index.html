<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Guitar Del Sol | PrOmid</title>

    <style>
        /* ----- ریست و تنظیمات پایه ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.8s ease;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* ----- کارت پلیر تمام‌صفحه ----- */
        .player-card {
            background: rgba(24, 24, 24, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 0;
            padding: 28px 26px 30px;
            width: 100%;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            max-width: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: none;
            border: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* ----- هدر ----- */
        .player-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 22px;
            flex-shrink: 0;
        }

        .player-header .brand {
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            opacity: 0.8;
        }

        .player-header .brand span {
            color: #1db954;
        }

        /* ----- کاور آلبوم ----- */
        .artwork-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto 26px;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            background: #1f1f1f;
            flex-shrink: 0;
        }

        .artwork-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.7s ease-in-out;
            opacity: 1;
        }

        /* ----- اطلاعات آهنگ ----- */
        .track-info {
            margin-bottom: 24px;
            text-align: center;
            flex-shrink: 0;
        }

        .track-info .title {
            color: #fff;
            font-size: 21px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .track-info .artist {
            color: #b0b0b0;
            font-size: 15px;
            font-weight: 400;
        }

        /* ===== نوار پیشرفت و کنترل‌ها ===== */
        .progress-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            direction: ltr;
            flex-shrink: 0;
        }

        .progress-section .time {
            color: #9a9a9a;
            font-size: 12px;
            font-weight: 500;
            min-width: 38px;
            font-variant-numeric: tabular-nums;
            text-align: center;
        }

        .progress-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.2s;
            direction: ltr;
        }

        .progress-track:hover {
            height: 6px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #1db954;
            border-radius: 10px;
            position: relative;
            transition: width 0.05s linear;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .progress-track:hover .progress-fill::after {
            opacity: 1;
        }

        /* ----- دکمه‌های کنترل ----- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 28px;
            margin-bottom: 22px;
            flex-shrink: 0;
        }

        .controls button {
            background: none;
            border: none;
            color: #bfbfbf;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            border-radius: 50%;
            width: 44px;
            height: 44px;
        }

        .controls button:hover {
            color: #fff;
            transform: scale(1.04);
            background: rgba(255, 255, 255, 0.04);
        }

        .controls .play-btn {
            background: #1db954;
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            box-shadow: 0 8px 30px rgba(29, 185, 84, 0.35);
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .controls .play-btn:hover {
            transform: scale(1.05);
            background: #1ed760;
            box-shadow: 0 8px 40px rgba(29, 185, 84, 0.5);
        }

        .controls .play-btn.playing {
            animation: pulse-ring 1.8s infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4); }
            100% { box-shadow: 0 0 0 20px rgba(29, 185, 84, 0); }
        }

        /* ----- کنترل صدا ----- */
        .volume-section {
            display: flex;
            align-items: center;
            gap: 14px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 16px;
            direction: ltr;
            flex-shrink: 0;
        }

        .volume-section .icon {
            color: #9a9a9a;
            font-size: 17px;
        }

        .volume-track {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            direction: ltr;
        }

        .volume-fill {
            height: 100%;
            width: 80%;
            background: #b0b0b0;
            border-radius: 10px;
            transition: width 0.1s;
        }

        .volume-track:hover .volume-fill {
            background: #1db954;
        }

        /* ----- فوتر ----- */
        .footer {
            text-align: center;
            padding-top: 4px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            user-select: none;
            flex-shrink: 0;
        }

        .footer span {
            color: rgba(255, 255, 255, 0.25);
        }

        /* ===== واکنش‌گرایی ===== */
        @media (max-width: 480px) {
            .player-card {
                padding: 20px 16px 22px;
            }
            .track-info .title {
                font-size: 18px;
            }
            .controls {
                gap: 16px;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 18px;
                padding: 4px;
            }
            .controls .play-btn {
                width: 52px;
                height: 52px;
                font-size: 26px;
            }
            .artwork-wrapper {
                border-radius: 16px;
                margin-bottom: 20px;
                max-width: 320px;
            }
            .footer {
                font-size: 9px;
            }
        }

        @media (min-width: 768px) {
            .player-card {
                border-radius: 32px;
                max-width: 420px;
                max-height: 90vh;
                height: auto;
                box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.03);
            }
            .artwork-wrapper {
                max-width: 100%;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }

        /* دکمه تمام‌صفحه (فقط در موبایل) */
        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            z-index: 999;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .fullscreen-btn {
                display: flex;
            }
        }

        /* حالت تمام‌صفحه واقعی */
        .player-card:-webkit-full-screen {
            border-radius: 0 !important;
            padding: 28px 26px 30px !important;
        }

        .player-card:fullscreen {
            border-radius: 0 !important;
            padding: 28px 26px 30px !important;
        }
    </style>
</head>

<body>
    <div class="player-card" id="playerCard">
        <!-- هدر -->
        <div class="player-header">
            <span class="brand">🎧 <span>PROMID</span>MUSIC</span>
        </div>

        <!-- کاور -->
        <div class="artwork-wrapper">
            <img id="artworkImage" src="https://raw.githubusercontent.com/PROMIDMUSIC/PrOmid---Guitar-Del-Sol/main/PrOmid%20-%20Guitar%20Del%20Sol.PNG" alt="Artwork">
        </div>

        <!-- اطلاعات آهنگ -->
        <div class="track-info">
            <div class="title" id="trackTitle">Guitar Del Sol</div>
            <div class="artist" id="trackArtist">PrOmid</div>
        </div>

        <!-- نوار پیشرفت -->
        <div class="progress-section">
            <span class="time" id="currentTime">0:00</span>
            <div class="progress-track" id="progressTrack">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time" id="totalTime">0:00</span>
        </div>

        <!-- دکمه‌ها -->
        <div class="controls">
            <button id="prevBtn" aria-label="قبلی" title="۱۰ ثانیه قبل">⏮</button>
            <button class="play-btn" id="playBtn" aria-label="پخش یا توقف">▶</button>
            <button id="nextBtn" aria-label="بعدی" title="۱۰ ثانیه بعد">⏭</button>
        </div>

        <!-- کنترل صدا -->
        <div class="volume-section">
            <span class="icon">🔊</span>
            <div class="volume-track" id="volumeTrack">
                <div class="volume-fill" id="volumeFill"></div>
            </div>
        </div>

        <!-- فوتر -->
        <div class="footer">
            <span>© PROMIDMUSIC</span>
        </div>
    </div>

    <!-- دکمه تمام‌صفحه -->
    <button class="fullscreen-btn" id="fullscreenBtn">
        <span>⛶</span> تمام‌صفحه
    </button>

    <!-- المنت صوتی -->
    <audio id="audioPlayer" preload="metadata">
        <source src="https://raw.githubusercontent.com/PROMIDMUSIC/PrOmid---Guitar-Del-Sol/main/PrOmid%20-%20Guitar%20Del%20Sol.mp3" type="audio/mpeg">
        مرورگر شما از پلیر صوتی پشتیبانی نمی‌کند.
    </audio>

    <script>
        // =============================================
        //  اسکریپت کامل با قابلیت تمام‌صفحه واقعی
        // =============================================

        // ----- عناصر DOM -----
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const progressFill = document.getElementById('progressFill');
        const progressTrack = document.getElementById('progressTrack');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeFill = document.getElementById('volumeFill');
        const volumeTrack = document.getElementById('volumeTrack');
        const artworkImg = document.getElementById('artworkImage');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const playerCard = document.getElementById('playerCard');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // =============================================
        //  ترفند مخفی کردن نوار مرورگر (روش استاندارد)
        // =============================================

        // تنظیم ارتفاع viewport
        function setVH() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setVH();
        window.addEventListener('resize', setVH);

        // مخفی کردن تولبار با اسکرول
        function hideBrowserUI() {
            window.scrollTo(0, 1);
            setTimeout(() => {
                window.scrollTo(0, 0);
            }, 50);
        }

        window.addEventListener('load', () => {
            setTimeout(hideBrowserUI, 100);
            setTimeout(hideBrowserUI, 500);
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(hideBrowserUI, 300);
            setTimeout(hideBrowserUI, 600);
        });

        document.addEventListener('click', hideBrowserUI);
        document.addEventListener('touchstart', hideBrowserUI, { passive: true });

        // جلوگیری از اسکرول پایین
        document.addEventListener('touchmove', (e) => {
            if (e.target.closest('.progress-track') || e.target.closest('.volume-track')) {
                return;
            }
            e.preventDefault();
        }, { passive: false });

        // =============================================
        //  حالت تمام‌صفحه واقعی (Fullscreen API)
        // =============================================

        async function toggleFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    fullscreenBtn.textContent = '✕ خروج';
                    fullscreenBtn.innerHTML = '<span>✕</span> خروج';
                } else {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                        fullscreenBtn.textContent = '⛶ تمام‌صفحه';
                        fullscreenBtn.innerHTML = '<span>⛶</span> تمام‌صفحه';
                    }
                }
            } catch (err) {
                console.warn('خطا در تغییر حالت تمام‌صفحه:', err);
                // اگر Fullscreen API کار نکرد، از روش اسکرول استفاده می‌کنیم
                hideBrowserUI();
                alert('لطفاً برای مشاهده تمام‌صفحه، روی دکمه "تمام‌صفحه" در مرورگر کلیک کنید.');
            }
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // اگر کاربر با کلید ESC خارج شد، دکمه را به‌روز کن
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                fullscreenBtn.textContent = '⛶ تمام‌صفحه';
                fullscreenBtn.innerHTML = '<span>⛶</span> تمام‌صفحه';
            }
        });

        // =============================================
        //  کنترل پخش و توقف
        // =============================================
        function togglePlay() {
            if (audio.paused) {
                audio.play().catch(e => console.warn('خطا در پخش:', e));
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                updateMediaSession(true);
            } else {
                audio.pause();
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
                updateMediaSession(false);
            }
        }

        playBtn.addEventListener('click', togglePlay);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !e.repeat) {
                e.preventDefault();
                togglePlay();
            }
        });

        // =============================================
        //  مدیریت زمان و نوار پیشرفت
        // =============================================
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return min + ':' + (sec < 10 ? '0' : '') + sec;
        }

        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100 || 0;
            progressFill.style.width = Math.min(percent, 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);

            if ('mediaSession' in navigator) {
                navigator.mediaSession.setPositionState({
                    duration: audio.duration || 0,
                    position: audio.currentTime || 0,
                    playbackRate: audio.playbackRate,
                });
            }
        });

        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setPositionState({
                    duration: audio.duration || 0,
                    position: 0,
                    playbackRate: audio.playbackRate,
                });
            }
        });

        progressTrack.addEventListener('click', (e) => {
            const rect = progressTrack.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            audio.currentTime = percent * audio.duration;
        });

        // =============================================
        //  دکمه‌های جلو و عقب
        // =============================================
        document.getElementById('prevBtn').addEventListener('click', () => {
            audio.currentTime = Math.max(0, audio.currentTime - 10);
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
        });

        // =============================================
        //  کنترل صدا
        // =============================================
        audio.volume = 0.8;
        volumeFill.style.width = '80%';

        volumeTrack.addEventListener('click', (e) => {
            const rect = volumeTrack.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            audio.volume = percent;
            volumeFill.style.width = (percent * 100) + '%';
        });

        // =============================================
        //  تغییر رنگ پس‌زمینه بر اساس کاور
        // =============================================
        function extractDominantColor(imageElement) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 20;
            canvas.height = 20;
            ctx.drawImage(imageElement, 0, 0, 20, 20);
            const imageData = ctx.getImageData(0, 0, 20, 20).data;
            let r = 0, g = 0, b = 0, count = 0;
            for (let i = 0; i < imageData.length; i += 4) {
                r += imageData[i];
                g += imageData[i + 1];
                b += imageData[i + 2];
                count++;
            }
            r = Math.floor(r / count);
            g = Math.floor(g / count);
            b = Math.floor(b / count);
            return `rgb(${r}, ${g}, ${b})`;
        }

        artworkImg.addEventListener('load', function() {
            try {
                const color = extractDominantColor(this);
                document.body.style.backgroundColor = color;
            } catch (e) {
                console.log('⚠️ استخراج رنگ با مشکل مواجه شد.');
            }
        });

        if (artworkImg.complete) {
            artworkImg.dispatchEvent(new Event('load'));
        }

        // =============================================
        //  Media Session API (صفحه قفل)
        // =============================================
        function updateMediaSession(isPlaying) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
            }
        }

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: trackTitle.textContent,
                artist: trackArtist.textContent,
                album: 'Guitar Del Sol',
                artwork: [
                    {
                        src: 'https://raw.githubusercontent.com/PROMIDMUSIC/PrOmid---Guitar-Del-Sol/main/PrOmid%20-%20Guitar%20Del%20Sol.PNG',
                        sizes: '512x512',
                        type: 'image/png'
                    }
                ]
            });

            navigator.mediaSession.setActionHandler('play', () => {
                audio.play();
                playBtn.textContent = '⏸';
                playBtn.classList.add('playing');
                updateMediaSession(true);
            });

            navigator.mediaSession.setActionHandler('pause', () => {
                audio.pause();
                playBtn.textContent = '▶';
                playBtn.classList.remove('playing');
                updateMediaSession(false);
            });

            navigator.mediaSession.setActionHandler('seekbackward', (details) => {
                audio.currentTime = Math.max(0, audio.currentTime - (details.seekOffset || 10));
            });

            navigator.mediaSession.setActionHandler('seekforward', (details) => {
                audio.currentTime = Math.min(audio.duration, audio.currentTime + (details.seekOffset || 10));
            });

            navigator.mediaSession.setActionHandler('seekto', (details) => {
                if (details.fastSeek && 'fastSeek' in audio) {
                    audio.fastSeek(details.seekTime);
                    return;
                }
                audio.currentTime = details.seekTime;
            });
        }

        // =============================================
        //  مدیریت خطاها
        // =============================================
        audio.addEventListener('error', (e) => {
            console.warn('⚠️ خطا در پخش فایل صوتی:', e);
        });

        console.log('🎵 پلیر تمام‌صفحه PROMID با موفقیت راه‌اندازی شد!');
        console.log('💡 برای تمام‌صفحه واقعی، روی دکمه پایین سمت راست کلیک کنید.');
    </script>
</body>
</html>
